<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de senha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="conteudo">
        <div class="conteudo-titulo">
            <img src="https://images.icon-icons.com/3768/PNG/512/lock_padlock_icon_231589.png" jsaction="" class="sFlh5c FyHeAf iPVvYb" style="max-width: 512px; height: 100px; margin: 0px; width: 100px;" alt="ícone de Bloqueio cadeado" jsname="kn3ccd">
            <h2 class="titulo-principal">Gerador de senhas</h2>
            <h3 class="titulo-secundario">Gere instantaneamente uma senha aleatória e segura</h3>
        </div>
        <div class="conteudo-senha">
            <label for="senha">Senha</label>
            <input name="senha" type="text" id="campo-senha" readonly>
        </div>
        <div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button class="parametro-senha__botao" id="btn-menos">-</button>
                        <p class="parametro-senha__texto" id="tamanho-texto">12</p>
                        <button class="parametro-senha__botao" id="btn-mais">+</button>
                    </div>
                </div>               
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Características da senha</h4>
                    <div class="checkbox-opcoes">
                        <label><input type="checkbox" id="chk-maiusculas" checked> Letras Maiúsculas</label><br>
                        <label><input type="checkbox" id="chk-minusculas" checked> Letras Minúsculas</label><br>
                        <label><input type="checkbox" id="chk-numeros" checked> Números</label><br>
                        <label><input type="checkbox" id="chk-simbolos"> Símbolos</label>
                    </div>
                </div>
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Força da senha</h4>
                    <div id="forca-barra" class="barra-forca"></div>
                    <p id="forca-texto"></p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
